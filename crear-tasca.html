<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nova Tasca</title>
    <link rel="stylesheet" href="css/style_tasca.css">
</head>
<body>
    <nav class="sidebar">
        <h2 class="nav-title">Menu</h2>
        <ul class="nav-list">
            <li><a href="index.html">Llistat d´activitats</a></li>
            <li><a href="crear-tasca.html">Crear Tasca</a></li>
            <li><a href="categories.html">Categories</a></li>
        </ul>
    </nav>

    <main style="margin-left: 220px; padding: 20px;">
        <h1>Crear Nova Tasca</h1>    
        <form>
            <label for="nom">Títol</label>
            <input type="text" id="nom" placeholder="Títol">
        
            <label for="descripcio">Descripció</label>
            <textarea id="descripcio" placeholder="Descripció"></textarea>
        
            <label for="data">Data</label>
            <input type="date" id="data">
        
            <label for="categoria">Categoria</label>
            <select id="categoria"></select>

            <label for="prioritat">Prioritat</label>
            <select id="prioritat">
                <option value="Alta">Alta</option>
                <option value="Mitjana">Mitjana</option>
                <option value="Baixa">Baixa</option>
            </select>
        
            <button type="button" class="btn-success" onclick="addTask()">Crear tasca</button>
        </form>
    </main>
    <script src="js/form-tasca.js"></script>
</body>
</html>
